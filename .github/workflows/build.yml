on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        mode:
          - debug
          - release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: xmake-io/github-action-setup-xmake@v1

      - uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\.xmake
          key: ${{ runner.os }}-xmake-${{ matrix.mode }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-xmake-${{ matrix.mode }}-
            ${{ runner.os }}-xmake-

      - name: Update xmake repositories
        run: xmake repo -u

      - name: Configure
        run: xmake f -a x64 -m ${{ matrix.mode }} -p windows -v -y

      - name: Build
        run: xmake -v -w -y

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.mode }}-windows-x64-${{ github.sha }}
          path: build/windows/x64/${{ matrix.mode }}/
          if-no-files-found: error
